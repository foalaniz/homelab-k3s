---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readeck
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: readeck
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: readeck-chart
        namespace: flux-system
  values:
    image:
      repository: codeberg.org/readeck/readeck
      tag: "latest"

    # Try alternative ingress structure for common chart library
    ingress:
      main:
        enabled: true
        className: traefik
        hosts:
          - host: "readeck.homelab.local"
            paths:
              - path: /
                pathType: Prefix

    # Alternative networking structure if above doesn't work
    # networking:
    #   ingress:
    #     enabled: true
    #     className: traefik
    #     hosts:
    #       - host: "readeck.homelab.local"
    #         paths:
    #           - path: /
    #             pathType: Prefix

    extraEnvFrom:
      - secretRef:
          name: readeck-db-secret

    # Persistence configuration
    persistence:
      data:
        enabled: true
        storageClass: "local-path"
        size: 5Gi
        accessMode: ReadWriteOnce

    # Optional: Add resource limits for homelab
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"