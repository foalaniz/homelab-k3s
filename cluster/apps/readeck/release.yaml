---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readeck
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: readeck
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: readeck-chart
        namespace: flux-system
  values:
    image:
      repository: zekker6/readeck
      tag: "v0.1.0-alpha.12"

    # Estructura de Ingress corregida (sin 'main')
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: "readeck.homelab.local"
          paths:
            - path: /
              pathType: Prefix
    
    # Carga las variables de entorno desde el secreto
    extraEnvFrom:
      - secretRef:
          name: readeck-db-secret

    # Estructura de Persistencia corregida (sin 'data')
    persistence:
      enabled: true
      storageClass: "local-path"
      size: 5Gi
      accessMode: ReadWriteOnce

    # Límites de recursos (esto está perfecto)
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"