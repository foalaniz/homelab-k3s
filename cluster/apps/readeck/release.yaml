---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readeck
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: readeck
      # Eliminamos la versión para que use la más reciente y evitar errores
      sourceRef:
        kind: HelmRepository
        name: readeck-chart
        namespace: flux-system
  values:
    image:
      repository: zekker6/readeck
      tag: "v0.1.0-alpha.12"

    # --- ESTRUCTURA CORREGIDA PARA EL INGRESS ---
    ingress:
      main: # La configuración ahora está bajo la llave 'main'
        enabled: true
        className: traefik
        hosts:
          - host: "readeck.homelab.local"
            paths:
              - path: /
                pathType: Prefix

    extraEnvFrom:
      - secretRef:
          name: readeck-db-secret

    # --- ESTRUCTURA CORREGIDA PARA LA PERSISTENCIA ---
    persistence:
      data: # La configuración ahora está bajo la llave 'data'
        enabled: true
        storageClass: "local-path"
        size: 5Gi
        accessMode: ReadWriteOnce