---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik-system
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: "28.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    providers:
      kubernetesIngress:
        enabled: true

    rbac:
      enabled: true

    ports:
      # Puerto para el tráfico de tus aplicaciones (ej. Grafana)
      web:
        port: 8000
        nodePort: 30080

      # --- CAMBIO AQUÍ ---
      # Puerto 'traefik' para el dashboard
      traefik:
        port: 9000
        # Exponerlo como un NodePort en el puerto 30090
        nodePort: 30090