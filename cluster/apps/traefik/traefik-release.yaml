---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik-system
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: "28.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    ports:
      web:
        port: 8000
      traefik:
        port: 9000
    rbac:
      enabled: true
    providers:
      kubernetesIngress:
        enabled: true


  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: traefik
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: traefik
              spec:
                template:
                  spec:
                    containers:
                      - name: traefik
                        ports:
                          - name: web
                            containerPort: 8000
                            hostPort: 80 # Conecta el contenedor al puerto 80 de la VM
                          - name: traefik
                            containerPort: 9000
                            hostPort: 8080 # Conecta el dashboard al puerto 8080 de la VM