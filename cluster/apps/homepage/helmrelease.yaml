apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: homepage
  namespace: default  # o "homepage" si creaste namespace
spec:
  interval: 15m
  chart:
    spec:
      chart: homepage
      version: "1.1.1"  # Versión estable
      sourceRef:
        kind: HelmRepository
        name: homepage-charts
        namespace: flux-system
  values:
    # --- Configuración Principal ---
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: homepage.tudominio.local  # Cambia por tu dominio
          paths:
            - path: /
              pathType: Prefix

    # --- Deshabilitar contenido por defecto ---
    config:
      providers:
        kubernetes: false
        docker: false
        bookmarks: false
        services: false
        widgets: false

    # --- Montar tu ConfigMap personalizado ---
    volumes:
      - name: custom-config
        configMap:
          name: homepage-config

    volumeMounts:
      - name: custom-config
        mountPath: /app/config
        readOnly: true