---
# ConfigMap para las variables de entorno
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-env-configmap
  namespace: default
data:
  # Aquí puedes poner variables de entorno no sensibles si las necesitas en el futuro
  # Por ejemplo:
  HOMEPAGE_VAR_1: "valor1"
  HOMEPAGE_VAR_2: "valor2"
---
# Secret para los archivos de configuración
apiVersion: v1
kind: Secret
metadata:
  name: homepage-config
  namespace: default
# Usamos stringData para que puedas pegar tus YAML directamente sin codificar
stringData:
  # Archivo de configuración general
  settings.yaml: |
    title: Mi Homelab
    header: Bienvenid@ a mi clúster de k3s
    providers:
      showDefaults: false
    background:
      image: https://images.unsplash.com/photo-1506260408121-e353d10b87c7
      blur: sm

  # Tu lista de servicios
  services.yaml: |
    - "Administración del Clúster":
        - "Traefik":
            icon: traefik
            href: "http://192.168.254.131:8080/dashboard/"
            description: "Dashboard del Ingress Controller"
        - "Grafana":
            icon: grafana
            href: "http://grafana.homelab.local"
            description: "Dashboards de Monitoreo"
    - "Bases de Datos":
        - "pgAdmin 4":
            icon: postgresql
            href: "http://pgadmin.homelab.local"
            description: "Interfaz para PostgreSQL"

  # Otros archivos opcionales que mencionaste, puedes dejarlos vacíos o añadir contenido
  bookmarks.yaml: ""
  custom.css: ""
  custom.js: ""
  docker.yaml: ""
  kubernetes.yaml: ""
  widgets.yaml: ""