apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: default  # Debe coincidir con el HelmRelease
data:
  settings.yaml: |
    title: "Mi Homelab"
    header: "Panel de Control"
    providers:
      showDefaults: false  # Importante!
    background:
      image: "https://images.unsplash.com/photo-1506260408121-e353d10b87c7"
      blur: "sm"
      opacity: 30

  services.yaml: |
    - "Administración":
        - "Traefik":
            icon: "traefik"
            href: "http://traefik.tudominio.local"
            description: "Ingress Controller"
        
        - "Grafana":
            icon: "grafana"
            href: "http://grafana.tudominio.local"
            description: "Dashboards de Monitoreo"

    - "Bases de Datos":
        - "PostgreSQL":
            icon: "postgresql"
            href: "http://postgres.tudominio.local"
            description: "Base de datos principal"
        
        - "pgAdmin":
            icon: "postgresql"
            href: "http://pgadmin.tudominio.local"
            description: "Interfaz web para PostgreSQL"

    - "Aplicaciones":
        - "CommaFeed":
            icon: "rss"
            href: "http://commafeed.tudominio.local"
            description: "Lector de feeds RSS"