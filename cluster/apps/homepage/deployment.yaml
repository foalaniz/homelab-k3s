apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage-deployment
  namespace: default
  labels:
    app: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: config-setup
          image: busybox:1.36
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command: ['sh', '-c']
          args:
            - |
              # Create config directory structure
              mkdir -p /app/config/logs
              # Copy ConfigMap data if files don't exist
              cp -n /tmp/config-readonly/* /app/config/ 2>/dev/null || true
              # Copy default settings if not provided
              cp -n /app/src/skeleton/settings.yaml /app/config/ 2>/dev/null || true
          volumeMounts:
            - name: config-readonly
              mountPath: /tmp/config-readonly
            - name: config-writable
              mountPath: /app/config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "*"
            - name: LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: config-writable
              mountPath: /app/config
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
      volumes:
        - name: config-readonly
          configMap:
            name: homepage-config
        - name: config-writable
          emptyDir: {}