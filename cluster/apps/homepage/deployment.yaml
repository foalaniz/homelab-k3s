apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage-deployment
  namespace: default
  labels:
    app: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: config-setup
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              mkdir -p /app/config
              [ -f /app/config/settings.yaml ] || cp /app/src/skeleton/settings.yaml /app/config/
              [ -f /app/config/services.yaml ] || cp /app/src/skeleton/services.yaml /app/config/
          volumeMounts:
            - name: config-writable
              mountPath: /app/config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOMEPAGE_CONFIG_DIR
              value: "/app/config"
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "*"
          volumeMounts:
            - name: config-writable
              mountPath: /app/config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config-writable
          emptyDir: {}