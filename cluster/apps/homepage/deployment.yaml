# Test with minimal configuration first
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config-minimal
  namespace: default
data:
  settings.yaml: |
    title: Test Homepage
    
  services.yaml: |
    - "Test Group":
        - "Test Service":
            icon: mdi-test-tube
            href: "http://example.com"
            description: "Test service"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage-test
  namespace: default
  labels:
    app: homepage-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage-test
  template:
    metadata:
      labels:
        app: homepage-test
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: config-setup
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              # Copy ConfigMap data to writable volume
              cp -r /tmp/config-readonly/* /app/config/ 2>/dev/null || true
              # Create any missing directories
              mkdir -p /app/config/logs
              # Set proper ownership
              chown -R 1000:1000 /app/config
          volumeMounts:
            - name: config-readonly
              mountPath: /tmp/config-readonly
            - name: config-writable
              mountPath: /app/config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: LOG_LEVEL
              value: "debug"
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "homepage.homelab.local,192.168.254.131,192.168.254.131:30082"
          volumeMounts:
            - name: config-writable
              mountPath: /app/config
      volumes:
        - name: config-readonly
          configMap:
            name: homepage-config-minimal
        - name: config-writable
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: homepage-test-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: homepage-test
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30082
      name: http