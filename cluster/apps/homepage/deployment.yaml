# FILE: homelab-k3s/cluster/apps/homepage/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage-deployment
  namespace: default
  labels:
    app: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      # Add this securityContext to ensure the container runs as a non-root user
      # with appropriate permissions for writable directories.
      securityContext:
        runAsUser: 1000 # Typical UID for non-root users (like 'node' user in many images)
        runAsGroup: 1000 # Typical GID for non-root users
        fsGroup: 1000 # Ensures mounted volumes are owned by this group
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "192.168.254.131:30081" # NODEport of your service
          volumeMounts:
            - name: homepage-config-volume
              mountPath: /app/config
            - name: homepage-data-volume # <--- NEW: Mount a writable volume
              mountPath: /app/config/logs # <--- NEW: Where Homepage tries to write logs
      volumes:
        - name: homepage-config-volume
          configMap:
            name: homepage-config
        - name: homepage-data-volume # <--- NEW: Define the writable volume
          emptyDir: {} # This creates an empty, writable directory for the Pod