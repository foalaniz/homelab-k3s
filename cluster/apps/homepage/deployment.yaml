apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage-deployment
  namespace: default # Cambia si usas otro namespace
  labels:
    app: homepage # importante para que el Service lo encuentre
spec:
  replicas: 1 # Puedes empezar con 1 réplica
  selector:
    matchLabels:
      app: homepage # Debe coincidir con las labels de arriba
  template:
    metadata:
      labels:
        app: homepage # Este label también debe coincidir
    spec:
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest # Asegúrate de usar la imagen correcta
          ports:
            - containerPort: 3000 # Homepage escucha internamente en el puerto 3000
              name: http
          env: # Variables de entorno (opcionales)
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "192.168.254.131:30081" # <--- FIX THIS! Use your actual NodePort (e.g., 30081).
                                                      # You can add "0.0.0.0" too for flexibility:
                                                      # value: "192.168.254.131:<your_nodeport>,0.0.0.0"
          volumeMounts: # <--- ADD THIS SECTION
            - name: homepage-config-volume
              mountPath: /app/config # This is where Homepage expects its config
      volumes: # <--- ADD THIS SECTION (at the same level as 'containers')
        - name: homepage-config-volume
          configMap:
            name: homepage-config # This MUST match the name in your ConfigMap (Step 1)