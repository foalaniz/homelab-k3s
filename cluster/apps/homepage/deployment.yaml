# Test with minimal configuration first
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config-minimal
  namespace: default
data:
  settings.yaml: |
    title: Test Homepage
    
  services.yaml: |
    - "Test Group":
        - "Test Service":
            icon: mdi-test-tube
            href: "http://example.com"
            description: "Test service"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage-test
  namespace: default
  labels:
    app: homepage-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage-test
  template:
    metadata:
      labels:
        app: homepage-test
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: LOG_LEVEL
              value: "debug"
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          configMap:
            name: homepage-config-minimal

---
apiVersion: v1
kind: Service
metadata:
  name: homepage-test-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: homepage-test
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30082
      name: http