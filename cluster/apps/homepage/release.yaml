---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: homepage
      version: "1.1.1" # Versión del chart
      sourceRef:
        kind: HelmRepository
        name: homepage-charts
        namespace: flux-system
  values:
    # Imagen que especificaste
    image:
      repository: ghcr.io/gethomepage/homepage
      tag: "v0.10.9"

    # Le decimos al chart que use el ConfigMap y el Secret que creamos
    config:
      # El chart montará el Secret 'homepage-config' en /app/config
      existingSecret: homepage-config

    # Inyectamos las variables de entorno desde nuestro ConfigMap
    envFrom:
      - configMapRef:
          name: homepage-env-configmap

    # Configuramos el Ingress
    ingress:
      main:
        enabled: true
        ingressClassName: traefik
        hosts:
          - host: "homepage.homelab.local"
            paths:
              - path: /
                pathType: Prefix

    # Contexto de seguridad para el pod
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

    # Contexto de seguridad para el contenedor
    containerSecurityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      seccompProfile:
        type: "RuntimeDefault"
      capabilities:
        drop:
          - ALL