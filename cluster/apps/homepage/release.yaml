apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: homepage
      version: "1.1.1"
      sourceRef:
        kind: HelmRepository
        name: homepage-charts
        namespace: flux-system
  values:
    # Deshabilitar todos los providers por defecto
    config:
      providers:
        kubernetes: false
        docker: false
        bookmarks: false
        services: false
        widgets: false
    
    # Montar solo TU configuración
    volumes:
      - name: config
        configMap:
          name: homepage-config
          items:
            - key: settings.yaml
              path: settings.yaml
            - key: services.yaml
              path: services.yaml

    volumeMounts:
      - name: config
        mountPath: /app/config
        readOnly: true
    
    # Configuración del Ingress
    ingress:
      main:
        enabled: true
        ingressClassName: traefik
        hosts:
          - host: homepage.homelab.local
            paths:
              - path: /
                pathType: Prefix