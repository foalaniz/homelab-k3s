---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: default
data:
  settings.yaml: |
    title: Mi Homelab
    header: Bienvenido a mi clúster K3s
    favicon: https://github.com/walkxcode/dashboard-icons/blob/main/png/heimdall.png
    theme: dark
    color: slate
    headerStyle: clean
    hideVersion: true

  services.yaml: |
    - "Administración":
        - "Traefik Dashboard":
            icon: traefik.png
            href: "http://192.168.254.131:8080/dashboard/"
            description: "Reverse Proxy & Load Balancer"
            ping: "http://traefik.traefik-system.svc.cluster.local:9000/ping"
        - "Grafana":
            icon: grafana.png
            href: "http://grafana.homelab.local"
            description: "Monitoring & Dashboards"
            ping: "http://grafana.homelab.local"

    - "Aplicaciones":
        - "Commafeed":
            icon: rss.png
            href: "http://commafeed.homelab.local"
            description: "RSS Feed Reader"
            ping: "http://commafeed.homelab.local"
        - "Readeck":
            icon: readeck.png
            href: "http://readeck.homelab.local"
            description: "Read Later App"
            ping: "http://readeck.homelab.local"

    - "Base de Datos":
        - "pgAdmin":
            icon: postgresql.png
            href: "http://pgadmin.homelab.local"
            description: "PostgreSQL Administration"
            ping: "http://pgadmin-service.default.svc.cluster.local:80"

  widgets.yaml: |
    - search:
        provider: duckduckgo
        target: _blank
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: short
          hourCycle: h23
    - openmeteo:
        label: Mexico City
        latitude: 19.4326
        longitude: -99.1332
        timezone: America/Mexico_City
        units: metric
        cache: 5

  bookmarks.yaml: |
    - "DevOps":
        - "Kubernetes":
            - abbr: K8s
              href: "https://kubernetes.io/docs/"
        - "Flux":
            - abbr: FLX
              href: "https://fluxcd.io/docs/"
        - "Traefik":
            - abbr: TFK
              href: "https://doc.traefik.io/traefik/"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:v0.9.10
        ports:
        - containerPort: 3000
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
        volumeMounts:
        - name: config
          mountPath: /app/config
        - name: homepage-logs # <--- AÑADE ESTE MONTAJE
          mountPath: /app/config/logs
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
      volumes:
      - name: config
        configMap:
          name: homepage-config
      - name: homepage-logs # <--- AÑADE ESTE VOLUMEN
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: default
spec:
  selector:
    app: homepage
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: homepage.homelab.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: homepage
            port:
              number: 3000