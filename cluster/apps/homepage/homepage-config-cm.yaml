apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config # Name this ConfigMap. Keep it consistent!
  namespace: default   # Must be in the same namespace as your Homepage deployment
data:
  # The key here will be the filename inside the container
  settings.yaml: |
    # PASTE THE ENTIRE CONTENT OF YOUR settings.yaml HERE.
    # Start with a very simple settings.yaml if you want to be sure it loads.
    # For example:
    homepage:
      title: My Homelab Dashboard
      header: Welcome
      layout:
        - greeting: 1

  # If you have other config files (e.g., services.yaml, widgets.yaml),
  # add them here with their respective content:
  # services.yaml: |
  #   - Home:
  #       - Documentation:
  #           icon: book
  #           href: https://gethomepage.dev/