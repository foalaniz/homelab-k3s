---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "59.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    alertmanager:
      enabled: false

    grafana:
      enabled: true
      admin:
        existingSecret: "grafana-admin-secret"
        userKey: "admin-user"
        passwordKey: "admin-password"

      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - grafana.homelab.local
      
      persistence:
        enabled: true
        storageClassName: "local-path"
      
      # --- CONFIGURACIÓN DE BASE DE DATOS (MÉTODO CORRECTO Y FINAL) ---
      
      # 1. Se definen las variables de entorno NO sensibles en el bloque 'env'
      env:
        GF_DATABASE_TYPE: "postgres"
        GF_DATABASE_HOST: "postgres-service.default.svc.cluster.local:5432"
        GF_DATABASE_NAME: "grafana"
        GF_DATABASE_SSL_MODE: "disable"


      # Esto tomará TODAS las llaves del secreto y las convertirá en variables de entorno.
      envFrom:
        - secretRef:
            name: grafana-db-credentials

    prometheus:
      enabled: true
      prometheusSpec:
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: "local-path"
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: "10Gi"