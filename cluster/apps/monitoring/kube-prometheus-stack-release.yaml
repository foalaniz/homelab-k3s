---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "59.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # --- Configuración General ---
    alertmanager:
      enabled: false
    prometheus-node-exporter:
      enabled: true

    # --- Configuración de Grafana ---
    grafana:
      enabled: true
      
      
      admin:
        existingSecret: "grafana-admin-secret" 
        userKey: "admin-user"                  
        passwordKey: "admin-password"          


      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: web
        hosts:
          - grafana.homelab.local
        paths:
          - /
        pathType: Prefix

      persistence:
        enabled: true
        type: pvc
        storageClassName: "local-path" 
        accessModes:
          - ReadWriteOnce
        size: "2Gi"

      grafana.ini:
        database:
          type: postgres
          host: "postgres-service.default.svc.cluster.local:5432" 
          name: "grafana"                                         
          user: ${__file:/etc/grafana/secrets/database/GF_DATABASE_USER}
          password: ${__file:/etc/grafana/secrets/database/GF_DATABASE_PASSWORD}
          ssl_mode: "disable"

      
      extraSecretMounts:
        - name: grafana-db-credentials-mount
          secretName: grafana-db-credentials
          defaultMode: 0440
          mountPath: /etc/grafana/secrets/database
          readOnly: true

    # --- Configuración de Prometheus ---
    prometheus:
      enabled: true
      prometheusSpec:
        
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: "local-path" 
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: "10Gi" 