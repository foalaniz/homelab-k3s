---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "59.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # --- Configuración General ---
    alertmanager:
      enabled: false
    prometheus-node-exporter:
      enabled: true

    # --- Configuración de Grafana ---
    grafana:
      enabled: true
      replicas: 1
      
      admin:
        existingSecret: "grafana-admin-secret" 
        userKey: "admin-user"                  
        passwordKey: "admin-password"          


      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: web
        hosts:
          - grafana.homelab.local
        paths:
          - /
        pathType: Prefix

      persistence:
        enabled: true
        type: pvc
        storageClassName: "local-path" 
        accessModes:
          - ReadWriteOnce
        size: "2Gi"

env:
        # Configuración general de la base de datos
        GF_DATABASE_TYPE: "postgres"
        GF_DATABASE_HOST: "postgres-service.default.svc.cluster.local:5432"
        GF_DATABASE_NAME: "grafana"
        GF_DATABASE_SSL_MODE: "disable"
        
        # Carga del usuario desde el secreto que creamos
        GF_DATABASE_USER:
          valueFrom:
            secretKeyRef:
              name: grafana-db-credentials
              key: GF_DATABASE_USER

        # Carga de la contraseña desde el secreto 
        GF_DATABASE_PASSWORD:
          valueFrom:
            secretKeyRef:
              name: grafana-db-credentials
              key: GF_DATABASE_PASSWORD

    # --- Configuración de Prometheus ---
    prometheus:
      enabled: true
      prometheusSpec:
        
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: "local-path" 
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: "10Gi" 