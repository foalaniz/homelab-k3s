# cluster/apps/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # 1. Definimos la Kustomization de INSTALACIÓN
  - apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    name: metallb-install
    namespace: flux-system
    spec:
      interval: 15m
      prune: true
      sourceRef: {kind: GitRepository, name: flux-system}
      path: ./cluster/apps/metallb

  # 2. Referenciamos la Kustomization de CONFIGURACIÓN (que ya tiene el 'dependsOn')
  - metallb-config.yaml

resources:
 - ./homepage
 - ./postgres
 - ./pgadmin
 - ./commafeed
 - ./monitoring
 - ./traefik
 - ./readeck
 - ./adguard
 #- ./metallb
 - ingress.yaml
 - flux-monitoring-kustomization.yaml
#- ./flux-system-monitoring 

