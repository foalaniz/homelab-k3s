apiVersion: v1
kind: Service
metadata:
  name: adguard-service
  namespace: default
spec:
  selector:
    app: adguard
  ports:
  - name: dns-udp
    port: 53
    targetPort: 53
    protocol: UDP
  - name: dns-tcp
    port: 53
    targetPort: 53
    protocol: TCP
  - name: http
    port: 8080  # Changed from 3000 to 8080 to avoid conflict with homepage
    targetPort: 3000  # Container still uses 3000 internally
    protocol: TCP
  type: ClusterIP