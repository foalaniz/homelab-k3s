---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wallabag
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: wallabag
      version: "7.2.0"
      sourceRef:
        kind: HelmRepository
        name: geek-cookbook
        namespace: flux-system
  values:
    # Fix the ingress configuration structure
    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: web
        hosts:
          - host: "wallabag.homelab.local"
            paths:
              - path: /
                pathType: Prefix
    
    # Fix the persistence configuration structure
    persistence:
      data:
        enabled: true
        storageClass: "local-path"
        size: 5Gi
        accessMode: ReadWriteOnce
        # Ensure the mount path is specified
        mountPath: /var/www/wallabag/data

    postgresql:
      enabled: false

    extraEnv:
      - name: SYMFONY__ENV__DATABASE_DRIVER
        value: "pdo_pgsql"
      - name: SYMFONY__ENV__DATABASE_HOST
        value: "postgres-service"
      - name: SYMFONY__ENV__DATABASE_PORT
        value: "5432"
      - name: SYMFONY__ENV__DATABASE_NAME
        value: "wallabag"
      - name: SYMFONY__ENV__DOMAIN_NAME
        value: "http://wallabag.homelab.local:30080/"
      - name: SYMFONY__ENV__DATABASE_USER
        valueFrom:
          secretKeyRef:
            name: wallabag-db-secret
            key: DB_USER
      - name: SYMFONY__ENV__DATABASE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: wallabag-db-secret
            key: DB_PASSWORD