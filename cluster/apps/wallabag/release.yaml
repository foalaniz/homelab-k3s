---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wallabag
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: wallabag
      version: "6.6.2" # Usamos una versión específica de este chart
      sourceRef:
        kind: HelmRepository
        name: k8s-home-lab # Apuntamos al nuevo repositorio
        namespace: flux-system
  values:
    image:
      repository: wallabag/wallabag
      tag: 2.6.9 # Usamos una etiqueta de imagen estable

    ingress:
      main:
        enabled: true
        ingressClassName: traefik
        hosts:
          - host: "wallabag.homelab.local"
            paths:
              - path: /
                pathType: Prefix

    # Este chart espera las variables de entorno aquí
    env:
      SYMFONY__ENV__DATABASE_DRIVER: "pdo_pgsql"
      SYMFONY__ENV__DATABASE_HOST: "postgres-service"
      SYMFONY__ENV__DATABASE_PORT: "5432"
      SYMFONY__ENV__DATABASE_NAME: "wallabag"
      SYMFONY__ENV__DOMAIN_NAME: "http://wallabag.homelab.local"

      # Cargamos el usuario y la contraseña desde el secreto que ya existe
      SYMFONY__ENV__DATABASE_USER:
        valueFrom:
          secretKeyRef:
            name: wallabag-db-secret
            key: DB_USER
      SYMFONY__ENV__DATABASE_PASSWORD:
        valueFrom:
          secretKeyRef:
            name: wallabag-db-secret
            key: DB_PASSWORD

    # Configuramos la persistencia
    persistence:
      data:
        enabled: true
        storageClass: "local-path"
        size: 5Gi
        accessMode: ReadWriteOnce