---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wallabag
  namespace: default # Namespace donde se desplegará Wallabag
spec:
  interval: 15m
  chart:
    spec:
      chart: wallabag
      version: "7.2.0" # Fijar una versión
      sourceRef:
        kind: HelmRepository
        name: geek-cookbook
        namespace: flux-system
  values:
    # Configuración del Ingress para acceder con un dominio
    ingress:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
      hosts:
        - host: "wallabag.homelab.local"
          paths:
            - path: /
              pathType: Prefix


    persistence:
      enabled: true
      storageClass: "local-path"
      size: 5Gi

    # Deshabilita PosgreSQL interno de Wallabag
    postgresql:
      enabled: false

    # Configuram la conexión a la base de datos PostgreSQL 
    
    extraEnv:
      - name: SYMFONY__ENV__DATABASE_DRIVER
        value: "pdo_pgsql"
      - name: SYMFONY__ENV__DATABASE_HOST
        value: "postgres-service"
      - name: SYMFONY__ENV__DATABASE_PORT
        value: "5432"
      - name: SYMFONY__ENV__DATABASE_NAME
        value: "wallabag"
      - name: SYMFONY__ENV__DOMAIN_NAME
        # URL pública
        value: "http://wallabag.homelab.local:30080"

      # Carga el usuario y la contraseña desde un secreto
      - name: SYMFONY__ENV__DATABASE_USER
        valueFrom:
          secretKeyRef:
            name: wallabag-db-secret # Nombre del secreto  
            key: DB_USER
      - name: SYMFONY__ENV__DATABASE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: wallabag-db-secret # Nombre del secreto 
            key: DB_PASSWORD