---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wallabag
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: wallabag
      version: "7.2.0"
      sourceRef:
        kind: HelmRepository
        name: geek-cookbook
        namespace: flux-system
  # PostRenderer para inyectar las variables de entorno
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: wallabag
            patch: |
              - op: replace
                path: /spec/template/spec/containers/0/env
                value:
                  - name: SYMFONY__ENV__DATABASE_DRIVER
                    value: "pdo_pgsql"
                  - name: SYMFONY__ENV__DATABASE_HOST
                    value: "postgres-service"
                  - name: SYMFONY__ENV__DATABASE_PORT
                    value: "5432"
                  - name: SYMFONY__ENV__DATABASE_NAME
                    value: "wallabag"
                  - name: SYMFONY__ENV__DOMAIN_NAME
                    value: "http://wallabag.homelab.local"
                  - name: SYMFONY__ENV__SERVER_NAME
                    value: "wallabag.homelab.local"
                  - name: SYMFONY__ENV__BASE_URL
                    value: "http://wallabag.homelab.local"
                  - name: SYMFONY__ENV__ASSETS_BASE_URL
                    value: "http://wallabag.homelab.local"
                  - name: SYMFONY__ENV__FOSUSER_REGISTRATION
                    value: "false"
                  - name: SYMFONY__ENV__FOSUSER_CONFIRMATION
                    value: "false"
                  - name: SYMFONY__ENV__DATABASE_USER
                    valueFrom:
                      secretKeyRef:
                        name: wallabag-db-secret
                        key: DB_USER
                  - name: SYMFONY__ENV__DATABASE_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: wallabag-db-secret
                        key: DB_PASSWORD
                  - name: TZ
                    value: "UTC"
  values:
    # Estructura corregida para el Ingress
    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: web
        hosts:
          - host: "wallabag.homelab.local"
            paths:
              - path: /
                pathType: Prefix
    
    # Estructura corregida para la persistencia
    persistence:
      data:
        enabled: true
        storageClass: "local-path"
        size: 5Gi
        accessMode: ReadWriteOnce
        mountPath: /var/www/wallabag/data

    postgresql:
      enabled: false

    # Ya no necesitamos extraEnv porque el postRenderer se encarga de todo
    # extraEnv: []